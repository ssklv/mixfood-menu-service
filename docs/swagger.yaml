basePath: /
definitions:
  domain.Dish:
    properties:
      calories:
        type: integer
      carbs:
        type: number
      categoryId:
        type: integer
      createdAt:
        type: string
      description:
        type: string
      fats:
        type: number
      id:
        type: integer
      imageUrl:
        type: string
      name:
        type: string
      price:
        type: number
      proteins:
        type: number
      updatedAt:
        type: string
      volume:
        type: number
      weight:
        type: integer
    type: object
  domain.UpdateDishParams:
    properties:
      calories:
        type: integer
      carbs:
        type: number
      categoryId:
        type: integer
      description:
        type: string
      fats:
        type: number
      imageUrl:
        type: string
      name:
        type: string
      price:
        type: number
      proteins:
        type: number
      volume:
        type: number
      weight:
        type: integer
    type: object
  handlers.ErrorResponse:
    properties:
      error:
        type: string
    type: object
host: localhost:8082
info:
  contact: {}
  description: API for managing menu categories and dishes
  title: Mixfood Menu Service API
  version: "1.0"
paths:
  /api/menu:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.Dish'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Get all dishes
    post:
      consumes:
      - application/json
      parameters:
      - description: Dish data
        in: body
        name: dish
        required: true
        schema:
          $ref: '#/definitions/domain.Dish'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/domain.Dish'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create a new dish
  /api/menu/{id}:
    delete:
      parameters:
      - description: Dish ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete dish from menu
    get:
      parameters:
      - description: Dish ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.Dish'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Get dish by ID
    patch:
      consumes:
      - application/json
      parameters:
      - description: Dish ID
        in: path
        name: id
        required: true
        type: integer
      - description: Fields to update
        in: body
        name: params
        required: true
        schema:
          $ref: '#/definitions/domain.UpdateDishParams'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.Dish'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update dish parameters
  /api/menu/upload:
    post:
      consumes:
      - multipart/form-data
      parameters:
      - description: Image file
        in: formData
        name: image
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Upload dish image
securityDefinitions:
  BearerAuth:
    description: 'Enter token in format: Bearer <token>'
    in: header
    name: Authorization
    type: apiKey
  CookieAuth:
    description: Access token (access_token) automatically retrieved from cookies
    in: cookie
    name: access_token
    type: apiKey
swagger: "2.0"
